name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual trigger (ADR-0046)
  schedule:
    # Google releases @google/gemini-cli ~Thursday 20:00 UTC.
    # We build Friday morning to catch the new version immediately.
    - cron: '0 5 * * 5'  # Friday at 05:00 UTC
    - cron: '0 12 * * 6' # Saturday at 12:00 UTC (Fallback/Hotfix catch)

permissions:
  contents: read # Default to least privilege

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Validate Bash Scripts
        run: |
          echo "::group::Syntax Check"
          bash -n bin/gemini-toolbox bin/gemini-hub
          find images -name "*.sh" -print0 | xargs -0 -I {} bash -n "{}"
          echo "::endgroup::"
          
          echo "::group::ShellCheck"
          shellcheck bin/gemini-toolbox bin/gemini-hub
          find images -name "*.sh" -not -path "*/libs/*" -print0 | xargs -0 shellcheck
          echo "::endgroup::"

      - name: Validate Python
        run: |
          echo "::group::Ruff & Syntax"
          find images/gemini-hub -name "*.py" -exec python -m py_compile {} +
          ruff check images/gemini-hub
          echo "::endgroup::"

      - name: Check Trivy TTLs
        run: |
          python3 scripts/check_trivy_ttl.py

  build-cache:
    name: Build & Cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bake All Images (Build to Cache)
        uses: docker/bake-action@v5
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ENABLE_ATTESTATIONS: false
        with:
          targets: default
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  test-bash:
    name: Bash Tests
    needs: [build-cache]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Bash Automated Tests
        run: |
          mkdir -p coverage/bash
          # Bake uses GHA cache from the build-cache job
          export GITHUB_REF="${{ github.ref }}"
          export GITHUB_EVENT_NAME="${{ github.event_name }}"
          
          # Test Fidelity: Mount only necessary sub-directories and files to prevent local files from masking image-internal dependencies.
          # We use 'make test-bash' but we need to ensure it uses the branch-isolated image.
          # The Makefile is updated to handle this via GITHUB_REF.
          make test-bash

      - name: Upload Bash Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bash
          path: coverage/bash/

  test-hub:
    name: Hub Tests
    needs: [build-cache]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Hub Automated Tests
        run: |
          mkdir -p coverage/python
          # Bake uses GHA cache from the build-cache job
          export GITHUB_REF="${{ github.ref }}"
          export GITHUB_EVENT_NAME="${{ github.event_name }}"
          make test-hub

      - name: Upload Hub Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-hub
          path: coverage/python/

  scan:
    name: Security Scan
    needs: [build-cache]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Strict Security Scan
        run: |
          # Bake uses GHA cache from the build-cache job
          export GITHUB_REF="${{ github.ref }}"
          export GITHUB_EVENT_NAME="${{ github.event_name }}"
          make build # Ensure images are loaded in this runner's daemon
          make scan

  publish:
    name: Publish & Sign
    needs: [test-bash, test-hub, scan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for keyless signing
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Publish All Images
        run: |
          # Use local defaults for version extraction
          make build
          VERSION=$(docker run --rm --entrypoint="" gemini-cli-toolbox/cli:latest gemini --version | tr -d '\r')
          PREVIEW_VER=$(docker run --rm --entrypoint="" gemini-cli-toolbox/cli-preview:latest gemini --version | tr -d '\r')
          
          # Strategy (ADR-0046): Build twice -- once without attestations to --load, once with attestations to --push
          # Actually, 'make build' above already loaded them.
          
          # Use Bake to push images with official tags
          export GITHUB_REF="${{ github.ref }}"
          export GITHUB_EVENT_NAME="${{ github.event_name }}"
          export REPO_PREFIX="${{ secrets.DOCKER_HUB_USER }}/gemini-cli-toolbox"
          export RELEASE_TYPE="suffix"
          export ENABLE_ATTESTATIONS="true"
          
          # Push everything
          docker buildx bake hub --push
          GEMINI_VERSION="$VERSION" docker buildx bake cli --push
          GEMINI_VERSION="$PREVIEW_VER" docker buildx bake cli-preview --push
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "PREVIEW_VER=$PREVIEW_VER" >> $GITHUB_ENV

      - name: Immutable Signing (Digest-Based)
        run: |
          REPO="${{ secrets.DOCKER_HUB_USER }}/gemini-cli-toolbox"
          
          # Capture Digests and sign them to prevent tag stealing (ADR-0046)
          # We use 'latest' tags here because the publish job is only for 'main' branch.
          for img in "$REPO:latest-hub" "$REPO:latest-stable" "$REPO:$VERSION-stable" "$REPO:latest-preview" "$REPO:$PREVIEW_VER-preview"; do
            digest=$(docker buildx imagetools inspect "$img" --format "{{json .Manifest.Digest}}" | tr -d '"')
            echo "Signing $img ($digest)..."
            cosign sign --yes "$REPO@$digest"
            # Also verify (ADR-0046)
            cosign verify "$REPO@$digest" --certificate-identity-regexp "https://github.com/Jsebayhi/gemini-cli-toolbox/.github/workflows/ci.yml" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          done

      - name: Update Docker Hub Description
        run: |
          make docker-readme

  update-coverage-badge:
    name: Update Coverage Badge
    needs: [test-bash, test-hub]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Bash Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-bash
          path: coverage/bash/

      - name: Download Hub Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-hub
          path: coverage/python/

      - name: Generate Bypass Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Compute Global Coverage & Update Badge
        run: |
          python3 scripts/update_coverage.py

      - name: Commit Coverage Badge Update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          token: ${{ steps.generate_token.outputs.token || github.token }}
          commit_message: "docs: update coverage badge [skip ci]"
          file_pattern: README.md

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        continue-error: true
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          repository: ${{ secrets.DOCKER_HUB_USER }}/gemini-cli-toolbox
          short-description: "Gemini CLI sandbox: Multi-Profile, Remote Access, Docker, VS Code Companion, Git Worktree."
          readme-filepath: ./README_DOCKER.md

  # Gatekeeper job for branch protection.
  all-checks-passed:
    name: All Checks Passed
    needs: [lint, build-cache, test-bash, test-hub, scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check dependency status
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Success
        run: echo "All checks passed successfully."
